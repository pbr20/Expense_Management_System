<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body class="login-body">

    <div class="login-card">

        <h2 class="text-center">
            Register Account
        </h2>

        <form id="registerForm">

            <input type="text"
                id="name"
                class="form-control mt-3"
                placeholder="Enter Full Name">

            <input type="email"
                id="email"
                class="form-control mt-3"
                placeholder="Enter Email">

            <input type="password"
                id="password"
                class="form-control mt-3"
                placeholder="Enter Password">

            <input type="number"
                id="age"
                class="form-control mt-3"
                placeholder="Enter Age">

            <input type="text"
                id="phone"
                class="form-control mt-3"
                placeholder="Enter Phone Number">

            <div class="mt-3">

                <label>
                    Gender:
                </label>

                <br>

                <input type="radio"
                    name="gender"
                    value="Male">

                Male

                <input type="radio"
                    name="gender"
                    value="Female"
                    class="ms-3">

                Female

            </div>

            <select id="profession"
                class="form-select mt-3">

                <option value="">
                    Select Profession
                </option>

                <option>
                    Student
                </option>

                <option>
                    Teacher
                </option>

                <option>
                    Freelancer
                </option>

                <option>
                    Businessman
                </option>

            </select>

            <select id="country"
                class="form-select mt-3">

                <option value="">
                    Select Country
                </option>

                <option>
                    Bangladesh
                </option>

                <option>
                    India
                </option>

                <option>
                    USA
                </option>

                <option>
                    UK
                </option>

            </select>

            <input type="number"
                id="monthlyIncome"
                class="form-control mt-3"
                placeholder="Monthly Income">

            <textarea
                id="goal"
                class="form-control mt-3"
                placeholder="Enter Financial Goal"></textarea>

            <div class="mt-3">

                <input type="checkbox"
                    id="terms">

                I agree to Terms & Conditions

            </div>

            <button type="submit"
                class="btn btn-success w-100 mt-3">

                Register

            </button>

        </form>

        <p class="text-center mt-3">

            Already have account?

            <a href="index.html">
                Login
            </a>

        </p>

    </div>

    <script type="module" src="auth.js"></script>

</body>

</html>
