<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Expense Analytics</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Chart JS -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="index.css">

</head>

<body>

    <div class="container mt-4">

        <h1 class="text-center">
            Expense Analytics Report
        </h1>

        <div class="text-center mt-3">

            <a href="home_page.html"
                class="btn btn-primary">

                Back To Dashboard

            </a>

        </div>

        <!-- Monthly Summary -->

        <div class="row mt-4">

            <div class="col-md-6">

                <div class="card p-4">

                    <h3>Monthly Income</h3>

                    <h2 id="monthlyIncome">
                        0 BDT
                    </h2>

                </div>

            </div>

            <div class="col-md-6">

                <div class="card p-4">

                    <h3>Monthly Expense</h3>

                    <h2 id="monthlyExpense">
                        0 BDT
                    </h2>

                </div>

            </div>

        </div>

        <!-- Yearly Summary -->

        <div class="row mt-4">

            <div class="col-md-6">

                <div class="card p-4">

                    <h3>Yearly Income</h3>

                    <h2 id="yearlyIncome">
                        0 BDT
                    </h2>

                </div>

            </div>

            <div class="col-md-6">

                <div class="card p-4">

                    <h3>Yearly Expense</h3>

                    <h2 id="yearlyExpense">
                        0 BDT
                    </h2>

                </div>

            </div>

        </div>

        <!-- Monthly Table -->

        <div class="card p-4 mt-4">

            <h3>Monthly Report</h3>

            <table class="table table-bordered mt-3">

                <thead>

                    <tr>

                        <th>Month</th>
                        <th>Income</th>
                        <th>Expense</th>
                        <th>Balance</th>

                    </tr>

                </thead>

                <tbody id="monthlyTable">

                </tbody>

            </table>

        </div>

        <!-- Yearly Table -->

        <div class="card p-4 mt-4">

            <h3>Yearly Report</h3>

            <table class="table table-bordered mt-3">

                <thead>

                    <tr>

                        <th>Year</th>
                        <th>Income</th>
                        <th>Expense</th>
                        <th>Balance</th>

                    </tr>

                </thead>

                <tbody id="yearlyTable">

                </tbody>

            </table>

        </div>

        <!-- Charts -->

        <div class="card p-4 mt-4">

            <h3>Monthly Statistics</h3>

            <canvas id="monthlyChart">

            </canvas>

        </div>

        <div class="card p-4 mt-4 mb-5">

            <h3>Yearly Statistics</h3>

            <canvas id="yearlyChart">

            </canvas>

        </div>

    </div>

    <script type="module" src="analytics.js"></script>

</body>

</html>
